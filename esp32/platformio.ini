; PlatformIO project for the ESC-50 edge classifier on ESP32-S3 (N16R8).
; Board not in hand at time of writing — this is the flash-ready scaffold.
;
; Build:  pio run
; Flash:  pio run -t upload
; Monitor: pio device monitor -b 115200
;
; The model array (src/esc50_model/model_data.cc) is generated by:
;   python ../scripts/export_esp32.py --tflite <clean_int8>.tflite
;
; Two envs: `esp32-s3-espnn` (default, Espressif esp-nn SIMD kernels, ~43-54x faster
; — mid model runs at 416ms) and `esp32-s3-devkitc-1` (reference kernels, kept for
; the before/after comparison in DECISIONS.md M9). Deployed model: mid int8 (70%).

[platformio]
default_envs = esp32-s3-espnn

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi   ; enable 8MB PSRAM (N16R8)
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    ; TFLite Micro for ESP32. mel_frontend.cc uses a portable pure-C FFT
    ; (src/fft.c), not esp-dsp -- add espressif/esp-dsp back only if/when
    ; swapping in dsps_fft2r_fc32 as a speed optimization (see fft.h).
    tanakamasayuki/TensorFlowLite_ESP32
    links2004/WebSockets

; Optimized-kernel variant: Espressif esp-tflite-micro + esp-nn (S3 SIMD assembly
; kernels) via the ESP_TF Arduino wrapper. Same main.cpp (API differences guarded
; on -DESP_NN). Reference kernels are ~40x slower on conv nets, so this is the
; real-time path. Build/flash with `pio run -e esp32-s3-espnn [-t upload]`.
[env:esp32-s3-espnn]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv
build_flags =
    -std=gnu++17
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
    -DESP_NN
    -DCONFIG_NN_OPTIMIZED
    -DARCH_ESP32_S3
build_unflags =
    -std=gnu++11
lib_deps =
    nickjgniklu/ESP_TF@^2.0.1
    links2004/WebSockets
