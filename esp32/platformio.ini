; PlatformIO project for the ESC-50 edge classifier on ESP32-S3 (N16R8).
; Board not in hand at time of writing — this is the flash-ready scaffold.
;
; Build:  pio run
; Flash:  pio run -t upload
; Monitor: pio device monitor -b 115200
;
; The model array (src/esc50_model/model_data.cc) is generated by:
;   python ../scripts/export_esp32.py --tflite <clean_int8>.tflite

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.arduino.memory_type = qio_opi   ; enable 8MB PSRAM (N16R8)
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    ; TFLite Micro for ESP32 + esp-dsp for the on-device FFT/mel front end.
    tanakamasayuki/TensorFlowLite_ESP32
    espressif/esp-dsp
    links2004/WebSockets
